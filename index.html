<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENSAISTOREMLBB · premium game top-up</title>
    <meta name="google-site-verification" content="IseFclLKLeiSgxDkQmAKWowQtNcYDMYA449I79puyyc" />
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #f5f7fb;
            color: #1d1d1f;
            line-height: 1.5;
        }

        /* premium admin toggle – hidden gem */
        #admin-toggle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 56px;
            height: 56px;
            border-radius: 30px;
            background: #1d1d1f;
            color: white;
            border: 2px solid #3a3a3c;
            box-shadow: 0 10px 30px -8px rgba(0,0,0,0.3);
            font-size: 24px;
            cursor: pointer;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.25s ease;
            backdrop-filter: blur(4px);
        }
        #admin-toggle:hover {
            background: #2d2d2f;
            transform: scale(1.05);
            border-color: #eab308;
        }
        /* admin panel — draggable, premium overlay */
        .admin-panel {
            position: fixed;
            top: 15%;
            right: 30px;
            width: 340px;
            background: rgba(22, 22, 24, 0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 32px;
            padding: 1.8rem 1.5rem;
            color: #f0f0f2;
            box-shadow: 0 30px 50px -20px black;
            z-index: 1000;
            transition: 0.3s cubic-bezier(0.2, 0.9, 0.3, 1);
            display: none;
        }
        .admin-panel.show {
            display: block;
        }
        .admin-panel h3 {
            font-weight: 500;
            letter-spacing: -0.02em;
            font-size: 1.6rem;
            margin-bottom: 0.4rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .admin-panel h3 i {
            color: #eab308;
            font-size: 1.8rem;
        }
        .admin-panel .drag-handle {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #888;
            cursor: move;
            font-size: 1.2rem;
            background: rgba(255,255,255,0.05);
            padding: 6px 10px;
            border-radius: 40px;
        }
        .admin-section {
            margin: 24px 0 16px;
        }
        .admin-section label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #aaa;
            margin-bottom: 6px;
        }
        .admin-section input, .admin-section textarea {
            width: 100%;
            background: rgba(255,255,255,0.07);
            border: 1px solid #3a3a3c;
            border-radius: 18px;
            padding: 12px 16px;
            color: white;
            font-size: 0.95rem;
            margin-bottom: 14px;
            transition: 0.15s;
        }
        .admin-section input:focus, .admin-section textarea:focus {
            outline: none;
            border-color: #eab308;
            background: rgba(255,255,255,0.1);
        }
        .admin-section button {
            background: #eab308;
            border: none;
            color: #1d1d1f;
            font-weight: 600;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.15s;
            width: 100%;
            margin-top: 6px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .admin-section button:hover {
            background: #f5c31e;
            transform: scale(0.98);
        }
        .admin-close {
            background: transparent;
            border: 1px solid #444;
            color: #ddd;
            margin-top: 12px;
            border-radius: 40px;
            padding: 10px;
            font-size: 0.9rem;
            width: 100%;
            cursor: pointer;
        }
        .admin-close:hover {
            background: #2a2a2c;
        }

        /* main store – ultra premium, like nike / puma / zara / gucci minimalism */
        .top-bar {
            background: white;
            padding: 1.2rem 5%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0,0,0,0.03);
            box-shadow: 0 6px 18px -12px rgba(0,0,0,0.08);
        }
        .logo {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            background: linear-gradient(140deg, #1d1d1f 20%, #515154);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo span {
            background: #eab308;
            color: black;
            padding: 0 6px;
            border-radius: 16px;
            font-size: 0.9rem;
            margin-left: 6px;
            -webkit-text-fill-color: black;
            background-clip: unset;
        }
        .nav-icons {
            display: flex;
            gap: 1.8rem;
            color: #2d2d2f;
            font-size: 1.3rem;
        }

        .hero {
            background: white;
            margin: 2rem 5% 1rem;
            padding: 3rem 3rem;
            border-radius: 42px;
            box-shadow: 0 20px 40px -20px rgba(0,0,0,0.2);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }
        .hero h1 {
            font-size: 3.2rem;
            font-weight: 600;
            letter-spacing: -0.03em;
            line-height: 1.1;
        }
        .hero h1 i {
            color: #eab308;
            font-size: 3rem;
        }
        .hero p {
            color: #5e5e64;
            max-width: 500px;
            margin-top: 1rem;
            font-size: 1.2rem;
        }

        .store-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin: 2rem 5% 4rem;
        }

        .product-card {
            background: white;
            border-radius: 32px;
            padding: 2rem 1.8rem;
            box-shadow: 0 20px 30px -15px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
            border: 1px solid rgba(0,0,0,0.02);
            backdrop-filter: blur(2px);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 30px 40px -18px rgba(0,0,0,0.15);
            border-color: rgba(234,179,8,0.15);
        }

        .product-image {
            width: 100%;
            height: 160px;
            background: #f1f3f6;
            border-radius: 24px;
            margin-bottom: 1.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.8rem;
            color: #2d2d2f;
            transition: 0.15s;
            object-fit: cover;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .product-category {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: #888;
        }
        .product-title {
            font-size: 1.7rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin: 0.2rem 0 0.5rem;
        }
        .product-desc {
            color: #5e5e64;
            font-size: 0.95rem;
            margin-bottom: 1.6rem;
        }
        .price-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: auto;
            border-top: 1px solid #efefef;
            padding-top: 1.5rem;
        }
        .price {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }
        .price small {
            font-size: 0.9rem;
            font-weight: 400;
            color: #777;
        }
        .buy-btn {
            background: #1d1d1f;
            border: none;
            color: white;
            padding: 0.8rem 1.8rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #3a3a3c;
        }
        .buy-btn:hover {
            background: #2d2d2f;
            gap: 12px;
        }

        .featured-badge {
            background: #eab308;
            color: black;
            padding: 0.3rem 0.8rem;
            border-radius: 100px;
            font-weight: 600;
            font-size: 0.8rem;
            position: absolute;
            top: 20px;
            right: 20px;
        }

        footer {
            background: white;
            padding: 2.5rem 5%;
            border-radius: 42px 42px 0 0;
            margin-top: 3rem;
            color: #5e5e64;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            border-top: 1px solid #eee;
        }

        /* responsiveness */
        @media (max-width: 680px) {
            .hero h1 { font-size: 2.2rem; }
        }

        /* photo credit */
        .photo-credit {
            font-size: 0.8rem;
            color: #bbb;
        }
    </style>
</head>
<body>
    <!-- admin controller toggle (only visible for you) -->
    <div id="admin-toggle" title="SENSAI ADMIN PANEL"><i class="fas fa-crown"></i></div>

    <!-- draggable admin panel — control everything -->
    <div id="admin-panel" class="admin-panel">
        <div class="drag-handle" id="drag-handle"><i class="fas fa-arrows-alt"></i> MOVE</div>
        <h3><i class="fas fa-dragon"></i> SENSAI<span style="color:#eab308;">CTRL</span></h3>
        <p style="color:#aaa; margin-bottom: 24px; font-size:0.9rem;">edit products, prices, images</p>

        <div class="admin-section">
            <label>📱 EDIT PRODUCT 1 (MLBB)</label>
            <input type="text" id="prod1-title" placeholder="Title" value="MLBB 1000 diamonds">
            <textarea id="prod1-desc" placeholder="Description" rows="2">Weekly pass + bonus 30</textarea>
            <input type="text" id="prod1-price" placeholder="Price (IDR / USD)" value="109.000">
            <input type="text" id="prod1-img" placeholder="Image emoji / icon" value="🥷">
            <label style="margin-top: 6px;">🖼️ or image URL (bg)</label>
            <input type="text" id="prod1-bg" placeholder="Background image URL" value="https://images.unsplash.com/photo-1627854784754-6b7b107c99e5?w=400&h=200&fit=crop&auto=format">
        </div>
        <div class="admin-section">
            <label>🔥 EDIT PRODUCT 2 (FREE FIRE)</label>
            <input type="text" id="prod2-title" placeholder="Title" value="Free Fire 500 diamonds">
            <textarea id="prod2-desc" placeholder="Description" rows="2">Elite pass + special skin</textarea>
            <input type="text" id="prod2-price" placeholder="Price" value="79.900">
            <input type="text" id="prod2-img" placeholder="Image emoji / icon" value="🔥">
            <input type="text" id="prod2-bg" placeholder="Background URL" value="https://images.unsplash.com/photo-1612287230202-1ff1d85d1b4f?w=400&h=200&fit=crop&auto=format">
        </div>
        <div class="admin-section">
            <label>⭐ PRODUCT 3 (PREMIUM BUNDLE)</label>
            <input type="text" id="prod3-title" placeholder="Title" value="MLBB + FF bundle">
            <textarea id="prod3-desc" placeholder="Description" rows="2">2000 dias + 1000 FF dias</textarea>
            <input type="text" id="prod3-price" placeholder="Price" value="299.000">
            <input type="text" id="prod3-img" placeholder="Image emoji / icon" value="💎">
            <input type="text" id="prod3-bg" placeholder="Background URL" value="https://images.unsplash.com/photo-1614680376593-902f74cf0d41?w=400&h=200&fit=crop&auto=format">
        </div>
        <div class="admin-section">
            <label>🖼️ GLOBAL PHOTO / LOGO EDIT</label>
            <input type="text" id="store-name-input" placeholder="Store name" value="SENSAISTOREMLBB">
            <button id="apply-global">apply changes to store</button>
        </div>
        <button class="admin-close" id="close-admin"><i class="fas-regular fa-xmark"></i> close panel (keep changes)</button>
        <p class="photo-credit" style="text-align:center; margin-top:12px;">admin: drag panel • all images editable</p>
    </div>

    <!-- PUBLIC STORE - PREMIUM LOOK -->
    <div class="top-bar">
        <div class="logo" id="store-logo-display">SENSAISTOREMLBB<span>™</span></div>
        <div class="nav-icons">
            <i class="far fa-user"></i>
            <i class="far fa-heart"></i>
            <i class="fas fa-bag-shopping"></i>
        </div>
    </div>

    <div class="hero">
        <div>
            <h1><i class="fas fa-bolt"></i> premium<br>game top-up</h1>
            <p>MLBB, Free Fire & exclusive bundles – instant delivery, 24/7.</p>
        </div>
        <div style="font-size: 4rem; background: #eab30820; padding: 1.5rem; border-radius: 50%; color:#eab308;">
            <i class="fas fa-diamond"></i>
        </div>
    </div>

    <!-- product grid injected via javascript (dynamic for admin control) -->
    <div class="store-grid" id="product-grid">
        <!-- products will be loaded via javascript -->
    </div>

    <footer>
        <div><strong>SENSAISTOREMLBB</strong> © 2025 · game diamond retailer</div>
        <div><i class="fab fa-whatsapp"></i> +62 812 3456 7890  |  <i class="fab fa-instagram"></i> @sensaistore</div>
    </footer>

    <script>
        (function() {
            // ---------- product data (initial, matches admin fields) ----------
            let products = [
                {
                    title: "MLBB 1000 diamonds",
                    desc: "Weekly pass + bonus 30",
                    price: "109.000",
                    icon: "🥷",
                    bg: "https://images.unsplash.com/photo-1627854784754-6b7b107c99e5?w=400&h=200&fit=crop&auto=format",
                    cat: "MLBB"
                },
                {
                    title: "Free Fire 500 diamonds",
                    desc: "Elite pass + special skin",
                    price: "79.900",
                    icon: "🔥",
                    bg: "https://images.unsplash.com/photo-1612287230202-1ff1d85d1b4f?w=400&h=200&fit=crop&auto=format",
                    cat: "FREE FIRE"
                },
                {
                    title: "MLBB + FF bundle",
                    desc: "2000 dias + 1000 FF dias",
                    price: "299.000",
                    icon: "💎",
                    bg: "https://images.unsplash.com/photo-1614680376593-902f74cf0d41?w=400&h=200&fit=crop&auto=format",
                    cat: "BUNDLE"
                }
            ];

            // references to DOM elements
            const grid = document.getElementById('product-grid');
            const storeLogo = document.getElementById('store-logo-display');
            const adminToggle = document.getElementById('admin-toggle');
            const adminPanel = document.getElementById('admin-panel');
            const closeAdmin = document.getElementById('close-admin');
            const dragHandle = document.getElementById('drag-handle');

            // admin input fields
            const prod1Title = document.getElementById('prod1-title');
            const prod1Desc = document.getElementById('prod1-desc');
            const prod1Price = document.getElementById('prod1-price');
            const prod1Icon = document.getElementById('prod1-img');
            const prod1Bg = document.getElementById('prod1-bg');

            const prod2Title = document.getElementById('prod2-title');
            const prod2Desc = document.getElementById('prod2-desc');
            const prod2Price = document.getElementById('prod2-price');
            const prod2Icon = document.getElementById('prod2-img');
            const prod2Bg = document.getElementById('prod2-bg');

            const prod3Title = document.getElementById('prod3-title');
            const prod3Desc = document.getElementById('prod3-desc');
            const prod3Price = document.getElementById('prod3-price');
            const prod3Icon = document.getElementById('prod3-img');
            const prod3Bg = document.getElementById('prod3-bg');

            const storeNameInput = document.getElementById('store-name-input');
            const applyBtn = document.getElementById('apply-global');

            // helper to render store from products array
            function renderStore() {
                let htmlStr = '';
                products.forEach((p, idx) => {
                    htmlStr += `
                        <div class="product-card">
                            ${idx === 1 ? '<div class="featured-badge">BESTSELLER</div>' : ''}
                            <div class="product-image" style="background-image: url(\'${p.bg}\'); background-size: cover; background-position: center; font-size: 0; text-indent: -9999px;" title="${p.icon}">
                                <span style="opacity:0;">${p.icon}</span>
                            </div>
                            <div class="product-category">${p.cat || (idx===0?'MLBB':idx===1?'FREE FIRE':'BUNDLE')}</div>
                            <div class="product-title">${p.title}</div>
                            <div class="product-desc">${p.desc}</div>
                            <div class="price-row">
                                <div class="price">$${p.price}<small> IDR</small></div>
                                <button class="buy-btn" onclick="buyProduct(\'${p.title}\')"><i class="fas fa-bolt"></i> top up</button>
                            </div>
                        </div>
                    `;
                });
                
                // ✅ FIXED: This line was missing!
                grid.innerHTML = htmlStr;
            }

            // buy function (simulated)
            window.buyProduct = (title) => {
                alert(`🛒 SENSAI STORE: ${title} added to cart (demo).`);
            };

            // sync admin fields from products array
            function syncAdminFields() {
                prod1Title.value = products[0].title;
                prod1Desc.value = products[0].desc;
                prod1Price.value = products[0].price;
                prod1Icon.value = products[0].icon;
                prod1Bg.value = products[0].bg;

                prod2Title.value = products[1].title;
                prod2Desc.value = products[1].desc;
                prod2Price.value = products[1].price;
                prod2Icon.value = products[1].icon;
                prod2Bg.value = products[1].bg;

                prod3Title.value = products[2].title;
                prod3Desc.value = products[2].desc;
                prod3Price.value = products[2].price;
                prod3Icon.value = products[2].icon;
                prod3Bg.value = products[2].bg;

                storeNameInput.value = storeLogo.innerText.replace('™', '').trim() || 'SENSAISTOREMLBB';
            }

            // update products array from admin fields, then render
            function updateProductsFromAdmin() {
                products[0] = {
                    title: prod1Title.value,
                    desc: prod1Desc.value,
                    price: prod1Price.value,
                    icon: prod1Icon.value,
                    bg: prod1Bg.value,
                    cat: 'MLBB'
                };
                products[1] = {
                    title: prod2Title.value,
                    desc: prod2Desc.value,
                    price: prod2Price.value,
                    icon: prod2Icon.value,
                    bg: prod2Bg.value,
                    cat: 'FREE FIRE'
                };
                products[2] = {
                    title: prod3Title.value,
                    desc: prod3Desc.value,
                    price: prod3Price.value,
                    icon: prod3Icon.value,
                    bg: prod3Bg.value,
                    cat: 'BUNDLE'
                };
                // update store name
                if (storeNameInput.value.trim() !== '') {
                    storeLogo.innerText = storeNameInput.value.trim() + '™';
                } else {
                    storeLogo.innerText = 'SENSAISTOREMLBB™';
                }
                renderStore();
            }

            // load initial render
            renderStore();
            syncAdminFields();

            // admin toggle
            adminToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                adminPanel.classList.toggle('show');
            });

            closeAdmin.addEventListener('click', () => {
                adminPanel.classList.remove('show');
            });

            // apply changes button
            applyBtn.addEventListener('click', () => {
                updateProductsFromAdmin();
                adminPanel.classList.remove('show');
            });

            // draggable panel
            let isDragging = false;
            let offsetX, offsetY;

            dragHandle.addEventListener('mousedown', (e) => {
                isDragging = true;
                offsetX = e.clientX - adminPanel.getBoundingClientRect().left;
                offsetY = e.clientY - adminPanel.getBoundingClientRect().top;
                adminPanel.style.cursor = 'grabbing';
            });

            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                e.preventDefault();
                const left = e.clientX - offsetX;
                const top = e.clientY - offsetY;
                adminPanel.style.left = left + 'px';
                adminPanel.style.right = 'auto';
                adminPanel.style.top = top + 'px';
            });

            window.addEventListener('mouseup', () => {
                isDragging = false;
                adminPanel.style.cursor = 'default';
            });

            console.log('SENSAI admin ready — you control the web.');
        })();
    </script>
</body>
</html>
