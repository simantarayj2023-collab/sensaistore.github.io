<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SENSAISTOREMLBB · ELITE</title><meta name="google-site-verification" content="Kbd0xXhCsrHih6TTW0VtFf2CCKq6olra80ECT-LdbRU" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            background: #ffffff;
            color: #000000;
            overflow-x: hidden;
        }

        /* ===== ENTRY ANIMATION - FULL SCREEN ===== */
        .entry-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            animation: slideUp 1.8s cubic-bezier(0.77, 0, 0.18, 1) forwards;
            animation-delay: 1.5s;
        }

        .entry-text {
            font-size: clamp(2rem, 10vw, 5rem);
            font-weight: 900;
            letter-spacing: 2px;
            color: white;
            text-transform: uppercase;
            text-align: center;
            animation: textPop 1.2s ease-out forwards;
            padding: 0 20px;
            width: 100%;
            word-break: break-word;
            line-height: 1.2;
        }

        @keyframes textPop {
            0% { transform: scale(0.3); opacity: 0; letter-spacing: 10px; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); letter-spacing: 2px; }
        }

        @keyframes slideUp {
            0% { transform: translateY(0); }
            100% { transform: translateY(-100%); }
        }

        /* ===== MAIN CONTENT - FULL WIDTH ===== */
        .main-content {
            opacity: 0;
            animation: fadeIn 0.8s ease-out 2.8s forwards;
            background: white;
            width: 100%;
            min-height: 100vh;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* premium navbar - full width */
        .navbar {
            position: sticky;
            top: 0;
            background: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            z-index: 100;
            width: 100%;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 2px;
        }
        .logo span {
            font-weight: 700;
            background: #f0f0f0;
            padding: 0.2rem 0.8rem;
            margin-left: 0.5rem;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        /* hero section - full width */
        .hero {
            padding: 3rem 5% 1.5rem;
            width: 100%;
        }
        .hero h2 {
            font-size: 2rem;
            font-weight: 200;
        }
        .hero h2 strong {
            font-weight: 700;
            background: #000;
            color: white;
            padding: 0.2rem 1rem;
        }

        /* horizontal scroll sections - full width */
        .horizontal-section {
            margin: 2rem 0;
            padding-left: 5%;
            width: 100%;
        }

        .section-title {
            font-size: 1rem;
            font-weight: 300;
            margin-bottom: 1rem;
            letter-spacing: 2px;
        }

        .scroll-container {
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            padding: 0.5rem 0 1.5rem;
            -webkit-overflow-scrolling: touch;
            width: 100%;
        }

        .scroll-container::-webkit-scrollbar {
            height: 3px;
        }
        .scroll-container::-webkit-scrollbar-track {
            background: #eee;
        }
        .scroll-container::-webkit-scrollbar-thumb {
            background: #000;
        }

        .card-row {
            display: inline-flex;
            gap: 1.2rem;
            padding-right: 5%;
        }

        /* product cards */
        .product-card {
            width: 240px;
            background: white;
            border: 1px solid #f0f0f0;
            display: inline-block;
            transition: all 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border-color: #000;
        }

        .card-image {
            width: 100%;
            height: 240px;
            background: #f5f5f5;
            background-size: cover;
            background-position: center;
        }

        .card-info {
            padding: 1.2rem;
        }

        .card-category {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: #888;
            letter-spacing: 1px;
        }

        .card-name {
            font-size: 1.1rem;
            font-weight: 500;
            margin: 0.4rem 0;
        }

        .card-price {
            font-size: 1rem;
            font-weight: 600;
        }

        .buy-button {
            background: black;
            color: white;
            border: none;
            padding: 0.7rem 1.2rem;
            width: 100%;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 0.8rem;
        }

        /* vertical section - full width */
        .vertical-section {
            margin: 3rem 5%;
            width: auto;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        .feature-card {
            border: 1px solid #eee;
            padding: 1.5rem;
        }

        /* footer - full width */
        footer {
            background: #000;
            color: white;
            padding: 2rem 5%;
            margin-top: 3rem;
            display: flex;
            justify-content: space-between;
            width: 100%;
        }

        /* admin trigger */
        .admin-trigger {
            position: fixed;
            bottom: 15px;
            right: 15px;
            width: 35px;
            height: 35px;
            background: transparent;
            border: 1px solid rgba(0,0,0,0.1);
            color: rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 999;
            font-size: 0.7rem;
        }

        /* admin panel */
        .admin-panel {
            position: fixed;
            top: 5%;
            right: 10px;
            width: 300px;
            background: white;
            border: 1px solid black;
            padding: 1.5rem;
            z-index: 10000;
            display: none;
            max-height: 90vh;
            overflow-y: auto;
        }

        .admin-panel.show {
            display: block;
        }

        /* responsive */
        @media (max-width: 600px) {
            .nav-links { gap: 1rem; }
            .product-card { width: 200px; }
            .card-image { height: 200px; }
            .grid-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- ENTRY ANIMATION - FULL SCREEN -->
<div class="entry-screen">
    <div class="entry-text">SENSAI STORE MLBB</div>
</div>

<!-- ADMIN TRIGGER (5 CLICKS) -->
<div class="admin-trigger" id="adminTrigger">⚡</div>

<!-- ADMIN PANEL -->
<div class="admin-panel" id="adminPanel">
    <h3 style="margin-bottom:1rem;">SENSAI CONTROL</h3>
    <div style="margin-bottom:1rem;">
        <label style="display:block; font-size:0.7rem;">PRODUCT 1 NAME</label>
        <input type="text" id="prod1Name" value="GOJO SATORU" style="width:100%; padding:0.5rem; border:1px solid #ddd;">
    </div>
    <div style="margin-bottom:1rem;">
        <label style="display:block; font-size:0.7rem;">PRODUCT 1 PRICE (₹)</label>
        <input type="text" id="prod1Price" value="1599" style="width:100%; padding:0.5rem; border:1px solid #ddd;">
    </div>
    <div style="margin-bottom:1rem;">
        <label style="display:block; font-size:0.7rem;">PRODUCT 1 IMAGE URL</label>
        <input type="text" id="prod1Img" value="https://via.placeholder.com/400x400?text=GOJO" style="width:100%; padding:0.5rem; border:1px solid #ddd;">
    </div>
    
    <div style="margin-bottom:1rem;">
        <label style="display:block; font-size:0.7rem;">PRODUCT 2 NAME</label>
        <input type="text" id="prod2Name" value="SUKUNA" style="width:100%; padding:0.5rem; border:1px solid #ddd;">
    </div>
    <div style="margin-bottom:1rem;">
        <label style="display:block; font-size:0.7rem;">PRODUCT 2 PRICE (₹)</label>
        <input type="text" id="prod2Price" value="1999" style="width:100%; padding:0.5rem; border:1px solid #ddd;">
    </div>
    <div style="margin-bottom:1rem;">
        <label style="display:block; font-size:0.7rem;">PRODUCT 2 IMAGE URL</label>
        <input type="text" id="prod2Img" value="https://via.placeholder.com/400x400?text=SUKUNA" style="width:100%; padding:0.5rem; border:1px solid #ddd;">
    </div>
    
    <div style="margin-bottom:1rem;">
        <label style="display:block; font-size:0.7rem;">PRODUCT 3 NAME</label>
        <input type="text" id="prod3Name" value="ITADORI" style="width:100%; padding:0.5rem; border:1px solid #ddd;">
    </div>
    <div style="margin-bottom:1rem;">
        <label style="display:block; font-size:0.7rem;">PRODUCT 3 PRICE (₹)</label>
        <input type="text" id="prod3Price" value="1299" style="width:100%; padding:0.5rem; border:1px solid #ddd;">
    </div>
    <div style="margin-bottom:1rem;">
        <label style="display:block; font-size:0.7rem;">PRODUCT 3 IMAGE URL</label>
        <input type="text" id="prod3Img" value="https://via.placeholder.com/400x400?text=ITADORI" style="width:100%; padding:0.5rem; border:1px solid #ddd;">
    </div>
    
    <button id="applyChanges" style="background:black; color:white; border:none; padding:0.7rem; width:100%; margin:0.3rem 0; cursor:pointer;">UPDATE STORE</button>
    <button id="closeAdmin" style="background:#ddd; color:black; border:none; padding:0.7rem; width:100%; cursor:pointer;">CLOSE</button>
</div>

<!-- MAIN CONTENT - FULL WIDTH -->
<div class="main-content">

    <!-- NAVBAR -->
    <div class="navbar">
        <div class="logo">SENSAI<span>MLBB</span></div>
        <div class="nav-links">
            <span>JJK</span>
            <span>MLBB</span>
            <span>FF</span>
            <span>LIMITED</span>
        </div>
    </div>

    <!-- HERO -->
    <div class="hero">
        <h2>JUJUTSU KAISEN <strong>ELITE COLLECTION</strong></h2>
    </div>

    <!-- HORIZONTAL SCROLL - JJK CHARACTERS -->
    <div class="horizontal-section">
        <div class="section-title">— HORIZONTAL · JJK CHARACTERS</div>
        <div class="scroll-container">
            <div class="card-row" id="jjkRow"></div>
        </div>
    </div>

    <!-- HORIZONTAL SCROLL - MLBB DIAMONDS -->
    <div class="horizontal-section">
        <div class="section-title">— MOBILE LEGENDS · DIAMONDS</div>
        <div class="scroll-container">
            <div class="card-row" id="mlbbRow"></div>
        </div>
    </div>

    <!-- VERTICAL GRID - BUNDLES -->
    <div class="vertical-section">
        <div class="section-title">— VERTICAL · PREMIUM BUNDLES</div>
        <div class="grid-2" id="verticalGrid"></div>
    </div>

    <!-- FOOTER -->
    <footer>
        <div>SENSAISTOREMLBB © 2026</div>
        <div>⚡ INSTANT 24/7</div>
    </footer>
</div>

<script>
    (function() {
        // PRODUCT DATA
        let jjkProducts = [
            { name: "GOJO SATORU", price: "1599", img: "https://via.placeholder.com/400x400?text=GOJO+SATURU", cat: "LIMITED" },
            { name: "SUKUNA", price: "1999", img: "https://via.placeholder.com/400x400?text=SUKUNA", cat: "ELITE" },
            { name: "ITADORI", price: "1299", img: "https://via.placeholder.com/400x400?text=ITADORI", cat: "ORIGINAL" },
            { name: "FUSHIGURO", price: "1399", img: "https://via.placeholder.com/400x400?text=FUSHIGURO", cat: "JJK" },
            { name: "KUGISAKI", price: "1499", img: "https://via.placeholder.com/400x400?text=KUGISAKI", cat: "JJK" }
        ];

        let mlbbProducts = [
            { name: "MLBB 1000", price: "1099", img: "https://via.placeholder.com/400x400?text=MLBB+1000", cat: "WEEKLY" },
            { name: "MLBB 2000", price: "1999", img: "https://via.placeholder.com/400x400?text=MLBB+2000", cat: "BONUS" },
            { name: "MLBB 5000", price: "4599", img: "https://via.placeholder.com/400x400?text=MLBB+5000", cat: "ELITE" },
            { name: "MLBB 10000", price: "8999", img: "https://via.placeholder.com/400x400?text=MLBB+10000", cat: "LIMITED" }
        ];

        let bundleProducts = [
            { name: "GOJO BUNDLE", price: "2999", img: "https://via.placeholder.com/400x400?text=GOJO+BUNDLE", cat: "LIMITED" },
            { name: "SUKUNA BUNDLE", price: "3999", img: "https://via.placeholder.com/400x400?text=SUKUNA+BUNDLE", cat: "ELITE" },
            { name: "ITADORI BUNDLE", price: "3499", img: "https://via.placeholder.com/400x400?text=ITADORI+BUNDLE", cat: "SPECIAL" }
        ];

        // DOM elements
        const jjkRow = document.getElementById('jjkRow');
        const mlbbRow = document.getElementById('mlbbRow');
        const verticalGrid = document.getElementById('verticalGrid');

        // Admin elements
        const prod1Name = document.getElementById('prod1Name');
        const prod1Price = document.getElementById('prod1Price');
        const prod1Img = document.getElementById('prod1Img');
        const prod2Name = document.getElementById('prod2Name');
        const prod2Price = document.getElementById('prod2Price');
        const prod2Img = document.getElementById('prod2Img');
        const prod3Name = document.getElementById('prod3Name');
        const prod3Price = document.getElementById('prod3Price');
        const prod3Img = document.getElementById('prod3Img');
        
        const adminPanel = document.getElementById('adminPanel');
        const adminTrigger = document.getElementById('adminTrigger');
        const closeAdmin = document.getElementById('closeAdmin');
        const applyBtn = document.getElementById('applyChanges');

        // Render functions
        function renderAll() {
            // JJK row
            let jjkHtml = '';
            jjkProducts.forEach(p => {
                jjkHtml += `
                    <div class="product-card">
                        <div class="card-image" style="background-image: url('${p.img}')"></div>
                        <div class="card-info">
                            <div class="card-category">${p.cat}</div>
                            <div class="card-name">${p.name}</div>
                            <div class="card-price">₹${p.price}</div>
                            <button class="buy-button" onclick="buyItem('${p.name}')">PURCHASE</button>
                        </div>
                    </div>
                `;
            });
            jjkRow.innerHTML = jjkHtml;

            // MLBB row
            let mlbbHtml = '';
            mlbbProducts.forEach(p => {
                mlbbHtml += `
                    <div class="product-card">
                        <div class="card-image" style="background-image: url('${p.img}')"></div>
                        <div class="card-info">
                            <div class="card-category">${p.cat}</div>
                            <div class="card-name">${p.name}</div>
                            <div class="card-price">₹${p.price}</div>
                            <button class="buy-button" onclick="buyItem('${p.name}')">PURCHASE</button>
                        </div>
                    </div>
                `;
            });
            mlbbRow.innerHTML = mlbbHtml;

            // Vertical grid
            let bundleHtml = '';
            bundleProducts.forEach(p => {
                bundleHtml += `
                    <div class="feature-card">
                        <div class="card-image" style="height:180px; background-image: url('${p.img}'); background-size:cover;"></div>
                        <div class="card-info">
                            <div class="card-category">${p.cat}</div>
                            <div class="card-name">${p.name}</div>
                            <div class="card-price">₹${p.price}</div>
                            <button class="buy-button" onclick="buyItem('${p.name}')">PURCHASE</button>
                        </div>
                    </div>
                `;
            });
            verticalGrid.innerHTML = bundleHtml;
        }

        window.buyItem = (name) => {
            alert(`✅ ${name} - WhatsApp: +62 812 3456 7890`);
        };

        // Admin functions
        function syncAdmin() {
            prod1Name.value = jjkProducts[0].name;
            prod1Price.value = jjkProducts[0].price;
            prod1Img.value = jjkProducts[0].img;
            prod2Name.value = jjkProducts[1].name;
            prod2Price.value = jjkProducts[1].price;
            prod2Img.value = jjkProducts[1].img;
            prod3Name.value = jjkProducts[2].name;
            prod3Price.value = jjkProducts[2].price;
            prod3Img.value = jjkProducts[2].img;
        }

        function updateStore() {
            jjkProducts[0] = { name: prod1Name.value, price: prod1Price.value, img: prod1Img.value, cat: "LIMITED" };
            jjkProducts[1] = { name: prod2Name.value, price: prod2Price.value, img: prod2Img.value, cat: "ELITE" };
            jjkProducts[2] = { name: prod3Name.value, price: prod3Price.value, img: prod3Img.value, cat: "JJK" };
            renderAll();
            adminPanel.classList.remove('show');
        }

        // Admin trigger - 5 clicks
        let clickCount = 0;
        adminTrigger.addEventListener('click', () => {
            clickCount++;
            if (clickCount >= 5) {
                adminPanel.classList.toggle('show');
                syncAdmin();
                clickCount = 0;
            }
            setTimeout(() => clickCount = 0, 2000);
        });

        closeAdmin.addEventListener('click', () => adminPanel.classList.remove('show'));
        applyBtn.addEventListener('click', updateStore);

        // Initial render
        renderAll();
    })();
</script>

</body>
</html>
