<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENSAISTOREMLBB · ELITE</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #ffffff;
            color: #000000;
            overflow-x: hidden;
        }

        /* ===== ENTRY ANIMATION - FIXED ===== */
        .entry-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: slideUp 1.8s cubic-bezier(0.77, 0, 0.18, 1) forwards;
            animation-delay: 1.5s;
            padding: 0 10px;
        }

        .entry-text {
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: 900;
            letter-spacing: 4px;
            color: white;
            text-transform: uppercase;
            transform: scale(1);
            animation: textPop 1.2s ease-out forwards;
            text-align: center;
            width: 100%;
            word-break: break-word;
            white-space: normal;
            line-height: 1.2;
        }

        @keyframes textPop {
            0% { transform: scale(0.3); opacity: 0; letter-spacing: 10px; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); letter-spacing: 4px; }
        }

        @keyframes slideUp {
            0% { transform: translateY(0); }
            100% { transform: translateY(-100%); }
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            opacity: 0;
            animation: fadeIn 0.8s ease-out 2.8s forwards;
            background: white;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* premium navbar */
        .navbar {
            position: sticky;
            top: 0;
            background: white;
            padding: 1.2rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 200;
            letter-spacing: 4px;
            color: #000;
        }
        .logo span {
            font-weight: 700;
            color: #000;
            background: #f0f0f0;
            padding: 0.2rem 1rem;
            margin-left: 0.5rem;
        }

        .nav-links {
            display: flex;
            gap: 3rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* hero section */
        .hero {
            padding: 4rem 3rem 2rem;
        }
        .hero h2 {
            font-size: 2.5rem;
            font-weight: 200;
            letter-spacing: -0.5px;
        }
        .hero h2 strong {
            font-weight: 700;
            background: #000;
            color: white;
            padding: 0.2rem 1rem;
        }

        /* ===== HORIZONTAL SCROLL SECTION ===== */
        .horizontal-section {
            margin: 3rem 0;
            padding-left: 3rem;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 300;
            margin-bottom: 1.5rem;
            letter-spacing: 4px;
        }

        .scroll-container {
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            padding: 1rem 0 2rem;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            scrollbar-color: #000 #eee;
        }

        .scroll-container::-webkit-scrollbar {
            height: 4px;
        }
        .scroll-container::-webkit-scrollbar-track {
            background: #eee;
        }
        .scroll-container::-webkit-scrollbar-thumb {
            background: #000;
        }

        .card-row {
            display: inline-flex;
            gap: 1.5rem;
            padding-right: 3rem;
        }

        /* product cards */
        .product-card {
            width: 280px;
            background: white;
            border: 1px solid #f0f0f0;
            display: inline-block;
            transition: all 0.3s;
            text-decoration: none;
            color: black;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.1);
            border-color: #000;
        }

        .card-image {
            width: 100%;
            height: 280px;
            background: #f5f5f5;
            background-size: cover;
            background-position: center;
        }

        .card-info {
            padding: 1.5rem;
        }

        .card-category {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #888;
            letter-spacing: 2px;
        }

        .card-name {
            font-size: 1.2rem;
            font-weight: 500;
            margin: 0.5rem 0;
        }

        .card-price {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .buy-button {
            background: black;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            width: 100%;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 1rem;
            transition: 0.2s;
        }

        .buy-button:hover {
            background: #333;
        }

        /* ===== VERTICAL SCROLL SECTION ===== */
        .vertical-section {
            margin: 4rem 3rem;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
        }

        .feature-card {
            border: 1px solid #eee;
            padding: 2rem;
        }

        /* ===== FOOTER ===== */
        footer {
            background: #000;
            color: white;
            padding: 3rem;
            margin-top: 4rem;
            display: flex;
            justify-content: space-between;
        }

        /* ===== ADMIN PANEL (HIDDEN) ===== */
        .admin-trigger {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: transparent;
            border: 1px solid rgba(0,0,0,0.1);
            color: rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 999;
            font-size: 0.7rem;
        }

        .admin-panel {
            position: fixed;
            top: 10%;
            right: 20px;
            width: 320px;
            background: white;
            border: 1px solid black;
            padding: 2rem;
            z-index: 2000;
            display: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .admin-panel.show {
            display: block;
        }

        .admin-panel h3 {
            font-weight: 300;
            margin-bottom: 1.5rem;
        }

        .admin-field {
            margin-bottom: 1rem;
        }

        .admin-field input {
            width: 100%;
            padding: 0.7rem;
            border: 1px solid #ddd;
        }

        .admin-btn {
            background: black;
            color: white;
            border: none;
            padding: 0.8rem;
            width: 100%;
            margin: 0.3rem 0;
            cursor: pointer;
        }
    </style>
</head>
<body>

<!-- ENTRY ANIMATION - SENSAISTOREMLBB NAME (FIXED - POORA DIKHEGA) -->
<div class="entry-screen">
    <div class="entry-text">SENSAI STORE MLBB</div>
</div>

<!-- ADMIN TRIGGER (5 CLICKS) -->
<div class="admin-trigger" id="adminTrigger">⚡</div>

<!-- ADMIN PANEL -->
<div class="admin-panel" id="adminPanel">
    <h3>SENSAI CONTROL</h3>
    <div class="admin-field">
        <label>PRODUCT 1 NAME</label>
        <input type="text" id="prod1Name" value="GOJO SATORU">
    </div>
    <div class="admin-field">
        <label>PRODUCT 1 PRICE (₹)</label>
        <input type="text" id="prod1Price" value="1599">
    </div>
    <div class="admin-field">
        <label>PRODUCT 1 IMAGE URL</label>
        <input type="text" id="prod1Img" value="https://via.placeholder.com/400x400?text=GOJO">
    </div>
    
    <div class="admin-field">
        <label>PRODUCT 2 NAME</label>
        <input type="text" id="prod2Name" value="SUKUNA">
    </div>
    <div class="admin-field">
        <label>PRODUCT 2 PRICE (₹)</label>
        <input type="text" id="prod2Price" value="1999">
    </div>
    <div class="admin-field">
        <label>PRODUCT 2 IMAGE URL</label>
        <input type="text" id="prod2Img" value="https://via.placeholder.com/400x400?text=SUKUNA">
    </div>
    
    <div class="admin-field">
        <label>PRODUCT 3 NAME</label>
        <input type="text" id="prod3Name" value="ITADORI YUJI">
    </div>
    <div class="admin-field">
        <label>PRODUCT 3 PRICE (₹)</label>
        <input type="text" id="prod3Price" value="1299">
    </div>
    <div class="admin-field">
        <label>PRODUCT 3 IMAGE URL</label>
        <input type="text" id="prod3Img" value="https://via.placeholder.com/400x400?text=ITADORI">
    </div>
    
    <button class="admin-btn" id="applyChanges">UPDATE STORE</button>
    <button class="admin-btn" id="closeAdmin" style="background:#ddd; color:black;">CLOSE</button>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">

    <!-- NAVBAR -->
    <div class="navbar">
        <div class="logo">SENSAI<span>MLBB</span></div>
        <div class="nav-links">
            <span>JJK</span>
            <span>MLBB</span>
            <span>FF</span>
            <span>LIMITED</span>
        </div>
    </div>

    <!-- HERO -->
    <div class="hero">
        <h2>JUJUTSU KAISEN <strong>ELITE COLLECTION</strong></h2>
    </div>

    <!-- HORIZONTAL SCROLL SECTION 1 -->
    <div class="horizontal-section">
        <div class="section-title">— HORIZONTAL · JJK CHARACTERS</div>
        <div class="scroll-container" id="horizontalScroll1">
            <div class="card-row" id="jjkRow">
                <!-- dynamic products -->
            </div>
        </div>
    </div>

    <!-- HORIZONTAL SCROLL SECTION 2 (MLBB) -->
    <div class="horizontal-section">
        <div class="section-title">— MOBILE LEGENDS · DIAMONDS</div>
        <div class="scroll-container" id="horizontalScroll2">
            <div class="card-row" id="mlbbRow">
                <!-- dynamic products -->
            </div>
        </div>
    </div>

    <!-- VERTICAL GRID SECTION -->
    <div class="vertical-section">
        <div class="section-title">— VERTICAL · PREMIUM BUNDLES</div>
        <div class="grid-2" id="verticalGrid">
            <!-- dynamic products -->
        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        <div>SENSAISTOREMLBB © 2026</div>
        <div>⚡ INSTANT DELIVERY · 24/7</div>
    </footer>
</div>

<script>
    (function() {
        // ===== PRODUCT DATA =====
        let jjkProducts = [
            { name: "GOJO SATORU", price: "1599", img: "https://via.placeholder.com/400x400?text=GOJO+SATURU", cat: "LIMITED" },
            { name: "SUKUNA", price: "1999", img: "https://via.placeholder.com/400x400?text=SUKUNA", cat: "ELITE" },
            { name: "ITADORI", price: "1299", img: "https://via.placeholder.com/400x400?text=ITADORI", cat: "ORIGINAL" },
            { name: "FUSHIGURO", price: "1399", img: "https://via.placeholder.com/400x400?text=FUSHIGURO", cat: "JJK" },
            { name: "KUGISAKI", price: "1499", img: "https://via.placeholder.com/400x400?text=KUGISAKI", cat: "JJK" }
        ];

        let mlbbProducts = [
            { name: "MLBB 1000", price: "1099", img: "https://via.placeholder.com/400x400?text=MLBB+1000", cat: "WEEKLY" },
            { name: "MLBB 2000", price: "1999", img: "https://via.placeholder.com/400x400?text=MLBB+2000", cat: "BONUS" },
            { name: "MLBB 5000", price: "4599", img: "https://via.placeholder.com/400x400?text=MLBB+5000", cat: "ELITE" }
        ];

        let bundleProducts = [
            { name: "GOJO BUNDLE", price: "2999", img: "https://via.placeholder.com/400x400?text=GOJO+BUNDLE", cat: "LIMITED" },
            { name: "SUKUNA BUNDLE", price: "3999", img: "https://via.placeholder.com/400x400?text=SUKUNA+BUNDLE", cat: "ELITE" }
        ];

        // DOM elements
        const jjkRow = document.getElementById('jjkRow');
        const mlbbRow = document.getElementById('mlbbRow');
        const verticalGrid = document.getElementById('verticalGrid');

        // Admin inputs
        const prod1Name = document.getElementById('prod1Name');
        const prod1Price = document.getElementById('prod1Price');
        const prod1Img = document.getElementById('prod1Img');
        const prod2Name = document.getElementById('prod2Name');
        const prod2Price = document.getElementById('prod2Price');
        const prod2Img = document.getElementById('prod2Img');
        const prod3Name = document.getElementById('prod3Name');
        const prod3Price = document.getElementById('prod3Price');
        const prod3Img = document.getElementById('prod3Img');
        
        const adminPanel = document.getElementById('adminPanel');
        const adminTrigger = document.getElementById('adminTrigger');
        const closeAdmin = document.getElementById('closeAdmin');
        const applyBtn = document.getElementById('applyChanges');

        // Render functions
        function renderJJK() {
            let html = '';
            jjkProducts.forEach(p => {
                html += `
                    <div class="product-card">
                        <div class="card-image" style="background-image: url('${p.img}')"></div>
                        <div class="card-info">
                            <div class="card-category">${p.cat}</div>
                            <div class="card-name">${p.name}</div>
                            <div class="card-price">₹${p.price}</div>
                            <button class="buy-button" onclick="buyItem('${p.name}')">PURCHASE</button>
                        </div>
                    </div>
                `;
            });
            jjkRow.innerHTML = html;
        }

        function renderMLBB() {
            let html = '';
            mlbbProducts.forEach(p => {
                html += `
                    <div class="product-card">
                        <div class="card-image" style="background-image: url('${p.img}')"></div>
                        <div class="card-info">
                            <div class="card-category">${p.cat}</div>
                            <div class="card-name">${p.name}</div>
                            <div class="card-price">₹${p.price}</div>
                            <button class="buy-button" onclick="buyItem('${p.name}')">PURCHASE</button>
                        </div>
                    </div>
                `;
            });
            mlbbRow.innerHTML = html;
        }

        function renderBundles() {
            let html = '';
            bundleProducts.forEach(p => {
                html += `
                    <div class="feature-card">
                        <div class="card-image" style="height:200px; background-image: url('${p.img}'); background-size:cover;"></div>
                        <div class="card-info">
                            <div class="card-category">${p.cat}</div>
                            <div class="card-name">${p.name}</div>
                            <div class="card-price">₹${p.price}</div>
                            <button class="buy-button" onclick="buyItem('${p.name}')">PURCHASE</button>
                        </div>
                    </div>
                `;
            });
            verticalGrid.innerHTML = html;
        }

        window.buyItem = (name) => {
            alert(`✅ ${name} added. WhatsApp +62 812 3456 7890`);
        };

        // Admin functions
        function syncAdmin() {
            prod1Name.value = jjkProducts[0].name;
            prod1Price.value = jjkProducts[0].price;
            prod1Img.value = jjkProducts[0].img;
            prod2Name.value = jjkProducts[1].name;
            prod2Price.value = jjkProducts[1].price;
            prod2Img.value = jjkProducts[1].img;
            prod3Name.value = jjkProducts[2].name;
            prod3Price.value = jjkProducts[2].price;
            prod3Img.value = jjkProducts[2].img;
        }

        function updateStore() {
            jjkProducts[0] = { name: prod1Name.value, price: prod1Price.value, img: prod1Img.value, cat: "LIMITED" };
            jjkProducts[1] = { name: prod2Name.value, price: prod2Price.value, img: prod2Img.value, cat: "ELITE" };
            jjkProducts[2] = { name: prod3Name.value, price: prod3Price.value, img: prod3Img.value, cat: "JJK" };
            renderJJK();
            adminPanel.classList.remove('show');
        }

        // Admin trigger - 5 clicks
        let clickCount = 0;
        adminTrigger.addEventListener('click', () => {
            clickCount++;
            if (clickCount >= 5) {
                adminPanel.classList.toggle('show');
                syncAdmin();
                clickCount = 0;
            }
            setTimeout(() => clickCount = 0, 2000);
        });

        closeAdmin.addEventListener('click', () => adminPanel.classList.remove('show'));
        applyBtn.addEventListener('click', updateStore);

        // Initial render
        renderJJK();
        renderMLBB();
        renderBundles();
    })();
</script>

<!-- Google verification meta tag yahan add karo -->
</body>
</html>
